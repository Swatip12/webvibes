# Server Configuration
server.port=${PORT:8081}
server.servlet.context-path=/

# Application Name
spring.application.name=webvibes-backend

# Database Configuration
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/webvibes_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:7447Swati@}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# SQL Initialization
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# JWT Configuration
jwt.secret=${JWT_SECRET:WebVibesTechnologySecretKeyForJWTTokenGenerationAndValidation2024AdminPanel}
jwt.expiration=${JWT_EXPIRATION:86400000}

# File Upload Configuration
app.upload.dir=${UPLOAD_DIR:uploads/syllabi}
app.base-url=${APP_BASE_URL:http://localhost:8081}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
