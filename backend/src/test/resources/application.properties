# Test configuration using H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Disable SQL init for tests
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# JWT Configuration
jwt.secret=TestSecretKeyForJWTTokenGenerationAndValidation2024AdminPanel
jwt.expiration=86400000

# Razorpay (dummy values for tests)
razorpay.key.id=rzp_test_xxx
razorpay.key.secret=test_secret

# Receipt storage
app.receipt.dir=uploads/receipts

# File Upload
app.upload.dir=uploads/syllabi
app.base-url=http://localhost:8081
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
