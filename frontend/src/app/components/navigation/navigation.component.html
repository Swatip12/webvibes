<nav class="navbar" [class.scrolled]="isScrolled">
  <div class="navbar-container">
    <!-- Logo and Brand -->
    <a class="navbar-brand" routerLink="/home">
      <div class="brand-logo">
        <img src="assets/logo.png" alt="WebVibes Technologies Logo" class="logo-img">
      </div>
    </a>

    <!-- Desktop Navigation Links -->
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link" routerLink="/home" routerLinkActive="active" 
           [routerLinkActiveOptions]="{exact: true}">Home</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" routerLink="/about" routerLinkActive="active">About</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" routerLink="/services" routerLinkActive="active">Services</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" routerLink="/courses" routerLinkActive="active">Courses</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" routerLink="/internship" routerLinkActive="active">Internships</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" routerLink="/projects" routerLinkActive="active">Projects</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" routerLink="/contact" routerLinkActive="active">Contact</a>
      </li>
    </ul>

    <a routerLink="/contact" class="navbar-cta-btn">Enquire Now</a>

    <!-- Mobile Hamburger Menu Button -->
    <button class="hamburger-menu" 
            type="button" 
            (click)="toggleMenu()" 
            [attr.aria-expanded]="!isMenuCollapsed" 
            [attr.aria-label]="isMenuCollapsed ? 'Open navigation menu' : 'Close navigation menu'"
            [class.active]="!isMenuCollapsed">
      <span class="hamburger-icon">
        <span class="line"></span>
        <span class="line"></span>
        <span class="line"></span>
      </span>
    </button>
  </div>
</nav>

<!-- Mobile Menu Drawer -->
<div class="mobile-menu-drawer" [class.open]="!isMenuCollapsed">
  <ul class="mobile-nav">
    <li class="mobile-nav-item">
      <a class="mobile-nav-link" routerLink="/home" routerLinkActive="active" 
         [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()">Home</a>
    </li>
    <li class="mobile-nav-item">
      <a class="mobile-nav-link" routerLink="/about" routerLinkActive="active" (click)="closeMenu()">About</a>
    </li>
    <li class="mobile-nav-item">
      <a class="mobile-nav-link" routerLink="/internship" routerLinkActive="active" (click)="closeMenu()">Internships</a>
    </li>
    <li class="mobile-nav-item">
      <a class="mobile-nav-link" routerLink="/courses" routerLinkActive="active" (click)="closeMenu()">Courses</a>
    </li>
    <li class="mobile-nav-item">
      <a class="mobile-nav-link" routerLink="/projects" routerLinkActive="active" (click)="closeMenu()">Projects</a>
    </li>
    <li class="mobile-nav-item">
      <a class="mobile-nav-link" routerLink="/services" routerLinkActive="active" (click)="closeMenu()">Services</a>
    </li>
    <li class="mobile-nav-item">
      <a class="mobile-nav-link" routerLink="/contact" routerLinkActive="active" (click)="closeMenu()">Contact</a>
    </li>
  </ul>
  <a routerLink="/contact" class="mobile-cta-btn" (click)="closeMenu()">
    <i class="fas fa-paper-plane"></i> Enquire Now
  </a>
</div>

<!-- Mobile Menu Overlay -->
<div class="mobile-menu-overlay" 
     [class.show]="!isMenuCollapsed" 
     (click)="closeMenu()"
     aria-hidden="true"></div>
