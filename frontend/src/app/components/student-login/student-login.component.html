<div class="auth-container">
  <div class="auth-card">

    <!-- ── Step 1: Login Form ── -->
    <ng-container *ngIf="step === 'login'">
      <h2>Student Login</h2>
      <div *ngIf="errorMessage" class="alert alert-error">{{ errorMessage }}</div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="email">Email</label>
          <div class="pw-wrap">
            <input id="email" type="email" formControlName="email" placeholder="Enter your email" autocomplete="email" />
          </div>
          <span class="field-error" *ngIf="f['email'].touched && f['email'].errors?.['required']">Email is required</span>
          <span class="field-error" *ngIf="f['email'].touched && f['email'].errors?.['email']">Enter a valid email</span>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="pw-wrap">
            <input id="password" [type]="showPw ? 'text' : 'password'" formControlName="password"
              placeholder="Enter your password" autocomplete="current-password" />
            <button type="button" class="pw-toggle" (click)="showPw = !showPw" tabindex="-1">
              {{ showPw ? '🙈' : '👁️' }}
            </button>
          </div>
          <span class="field-error" *ngIf="f['password'].touched && f['password'].errors?.['required']">Password is required</span>
        </div>

        <div class="forgot-link-row">
          <button type="button" class="forgot-link" (click)="step = 'forgot'">Forgot password?</button>
        </div>

        <button type="submit" [disabled]="loginForm.invalid || isLoading" class="btn-primary">
          {{ isLoading ? 'Logging in...' : 'Login' }}
        </button>
      </form>

      <p class="auth-link">Don't have an account? <a routerLink="/student/register">Register</a></p>
    </ng-container>

    <!-- ── Step 2: Forgot Password — Contact Admin ── -->
    <ng-container *ngIf="step === 'forgot'">
      <div class="step-header">
        <button class="back-btn" (click)="step = 'login'">← Back</button>
        <h2>Forgot Password?</h2>
      </div>

      <div class="forgot-panel">
        <div class="forgot-icon">🔑</div>
        <p class="forgot-desc">
          To reset your password, contact your WebVibes Technology admin.<br>
          They will reset it for you from the admin panel.
        </p>

        <div class="forgot-contact-btns">
          <a class="forgot-wa-btn"
             [href]="'https://wa.me/917447839781?text=Hi%2C%20I%20need%20to%20reset%20my%20student%20portal%20password.%20My%20registered%20email%20is%3A%20' + forgotEmail"
             target="_blank" rel="noopener">
            <span>💬</span> WhatsApp Admin
          </a>
          <button type="button" class="forgot-email-btn"
             (click)="emailAdmin()">
            <span>✉️</span> Email Admin
          </button>
        </div>

        <div class="forgot-email-row">
          <label class="forgot-email-label">Your registered email (to include in message)</label>
          <input type="email" class="forgot-email-input" [(ngModel)]="forgotEmail"
            placeholder="your@email.com" />
        </div>

        <button type="button" class="btn-back" (click)="step = 'login'">← Back to Login</button>
      </div>
    </ng-container>

  </div>
</div>
