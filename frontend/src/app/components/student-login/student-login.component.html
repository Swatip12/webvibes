<div class="auth-container">
  <div class="auth-card">
    <h2>Student Login</h2>

    <div *ngIf="errorMessage" class="alert alert-error">{{ errorMessage }}</div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" placeholder="Enter your email" />
        <span class="field-error" *ngIf="f['email'].touched && f['email'].errors?.['required']">
          Email is required
        </span>
        <span class="field-error" *ngIf="f['email'].touched && f['email'].errors?.['email']">
          Enter a valid email address
        </span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" formControlName="password" placeholder="Enter your password" />
        <span class="field-error" *ngIf="f['password'].touched && f['password'].errors?.['required']">
          Password is required
        </span>
      </div>

      <button type="submit" [disabled]="loginForm.invalid || isLoading" class="btn-primary">
        {{ isLoading ? 'Logging in...' : 'Login' }}
      </button>
    </form>

    <p class="auth-link">Don't have an account? <a routerLink="/student/register">Register</a></p>
  </div>
</div>
