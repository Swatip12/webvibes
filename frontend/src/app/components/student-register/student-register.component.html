<div class="auth-container">
  <div class="auth-card">
    <h2>Student Registration</h2>

    <div *ngIf="errorMessage" class="alert alert-error">{{ errorMessage }}</div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input id="name" type="text" formControlName="name" placeholder="Enter your full name" />
        <span class="field-error" *ngIf="f['name'].touched && f['name'].errors?.['required']">
          Name is required
        </span>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" placeholder="Enter your email" />
        <span class="field-error" *ngIf="f['email'].touched && f['email'].errors?.['required']">
          Email is required
        </span>
        <span class="field-error" *ngIf="f['email'].touched && f['email'].errors?.['email']">
          Enter a valid email address
        </span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" formControlName="password" placeholder="Minimum 8 characters" />
        <span class="field-error" *ngIf="f['password'].touched && f['password'].errors?.['required']">
          Password is required
        </span>
        <span class="field-error" *ngIf="f['password'].touched && f['password'].errors?.['minlength']">
          Password must be at least 8 characters
        </span>
      </div>

      <div class="form-group">
        <label for="mobile">Mobile Number</label>
        <input id="mobile" type="text" formControlName="mobile" placeholder="10-digit mobile number" />
        <span class="field-error" *ngIf="f['mobile'].touched && f['mobile'].errors?.['required']">
          Mobile number is required
        </span>
        <span class="field-error" *ngIf="f['mobile'].touched && f['mobile'].errors?.['pattern']">
          Enter a valid 10-digit mobile number
        </span>
      </div>

      <button type="submit" [disabled]="registerForm.invalid || isLoading" class="btn-primary">
        {{ isLoading ? 'Registering...' : 'Register' }}
      </button>
    </form>

    <p class="auth-link">Already have an account? <a routerLink="/student/login">Login</a></p>
  </div>
</div>
