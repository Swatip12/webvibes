<div class="projects-container">
  <div class="container">
    <h1 class="text-center mb-4">Student Projects</h1>
    <p class="text-center text-muted mb-5">Explore amazing projects created by our students</p>

    <!-- Loading State -->
    <div *ngIf="loading" class="text-center">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
      <p class="mt-3">Loading projects...</p>
    </div>

    <!-- Error State -->
    <div *ngIf="error && !loading" class="alert alert-danger text-center" role="alert">
      {{ error }}
    </div>

    <!-- No Projects Message -->
    <div *ngIf="!loading && !error && projects.length === 0" class="text-center">
      <p class="text-muted">No projects available</p>
    </div>

    <!-- Project Cards -->
    <div *ngIf="!loading && !error && projects.length > 0" class="row">
      <div class="col-12 col-md-6 col-lg-4 mb-4" *ngFor="let project of projects">
        <div class="card h-100 project-card">
          <img [src]="project.imageUrl" [alt]="project.title" class="card-img-top project-image">
          <div class="card-body">
            <h3 class="card-title">{{ project.title }}</h3>
            <p class="card-text">{{ project.description }}</p>
          </div>
          <div class="card-footer bg-transparent">
            <a [href]="project.githubLink" target="_blank" rel="noopener noreferrer" class="btn btn-primary w-100">
              <i class="bi bi-github"></i> View on GitHub
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
